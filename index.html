*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(135deg,#dfe6e9,#b2bec3);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;align-items:center}

/* ===== barra modo ===== */
.modebar{width:100%;background:#0b141a;color:#e9edef;flex-shrink:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.modebar .top{display:flex;align-items:center;gap:10px;padding:11px 16px 8px}
.modebar .dot{width:9px;height:9px;border-radius:50%;background:var(--wa-green);box-shadow:0 0 8px var(--wa-green)}
.modebar .name{font-weight:700;font-size:14px}
.modebar .live{font-size:10.5px;color:#0b141a;background:var(--wa-green);border-radius:20px;padding:3px 10px;margin-left:auto;font-weight:700}
.modebar .tabs{display:flex;gap:6px;padding:0 12px 11px}
.modebar .tab{flex:1;background:#1f2c34;color:#8696a0;border:1px solid #2a3942;border-radius:10px;padding:9px;font-size:12.5px;cursor:pointer;text-align:center;font-weight:600;transition:all .2s}
.modebar .tab.active{background:var(--wa-teal);color:#fff;border-color:var(--wa-teal)}

.stage{flex:1;width:100%;display:flex;justify-content:center;align-items:flex-start;padding:18px 16px 26px;overflow:hidden}
.phone{width:390px;max-width:100%;height:min(810px,calc(100dvh - 150px));background:var(--wa-bg);border-radius:34px;position:relative;overflow:hidden;box-shadow:var(--e3),0 0 0 10px #0b141a,0 0 0 12px #2a3942;display:flex;flex-direction:column}
.phone::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#0b141a;border-radius:0 0 16px 16px;z-index:60}

.view{position:absolute;inset:0;display:none;flex-direction:column;animation:fadeIn .25s}
.view.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== top bar ===== */
.wabar{background:var(--wa-teal);color:#fff;padding:34px 8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;box-shadow:var(--e2);z-index:30}
.wabar .bk{width:34px;height:40px;display:grid;place-items:center;cursor:pointer;border:none;background:none;color:#fff}
.wabar .bk svg{width:24px;height:24px}
.wabar .av{width:40px;height:40px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:20px;flex-shrink:0;overflow:hidden}
.wabar .av img{width:100%;height:100%;object-fit:cover}
.wabar .who{flex:1;min-width:0;margin-left:4px}
.wabar .who h1{font-size:16.5px;font-weight:600;line-height:1.1}
.wabar .who p{font-size:12px;opacity:.85;margin-top:1px}
.wabar .act{width:42px;height:42px;display:grid;place-items:center;cursor:pointer;border:none;background:none;color:#fff;border-radius:50%;position:relative}
.wabar .act svg{width:22px;height:22px}
.wabar .act .badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;border-radius:8px;background:var(--warn);color:#fff;font-size:9px;font-weight:800;display:grid;place-items:center;padding:0 3px}

/* ===== chat ===== */
.chat{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px;background:var(--wa-bg)}
.stamp{align-self:center;background:#FFF6D8;color:#5b6b54;font-size:11.5px;padding:5px 13px;border-radius:9px;box-shadow:var(--e1);margin:4px 0}
.tip{align-self:center;background:#D1F4CC;color:#1f6b4f;font-size:11.5px;padding:6px 14px;border-radius:9px;box-shadow:var(--e1);text-align:center;max-width:90%}
.msg{max-width:84%;padding:8px 11px;font-size:14.5px;line-height:1.45;box-shadow:var(--e1);animation:msgIn .24s cubic-bezier(.2,.7,.3,1);word-wrap:break-word}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.in{align-self:flex-start;background:var(--wa-in);border-radius:0 9px 9px 9px}.in b{color:var(--ink)}
.out{align-self:flex-end;background:var(--wa-out);border-radius:9px 0 9px 9px}
.msg .meta{font-size:10.5px;color:var(--ink-3);float:right;margin:4px 0 -3px 10px;display:flex;align-items:center;gap:3px}
.msg .meta svg{width:15px;height:11px;color:#34B7F1}
.msg img.receipt{width:100%;border-radius:7px;margin-bottom:5px;display:block;max-height:200px;object-fit:cover;box-shadow:var(--e1)}
.ecard{margin-top:7px;background:#fff;border-radius:12px;padding:11px;display:flex;align-items:center;gap:11px;box-shadow:var(--e2);border-left:4px solid var(--c-outros)}
.ecard .dot{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;font-size:19px;box-shadow:var(--e1)}
.ecard .info{flex:1;min-width:0}
.ecard .info .cat{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ecard .info .desc{font-size:13.5px;color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ecard .val{font-weight:700;font-size:16px;color:var(--ink)}
.ecard .val.inv{color:var(--c-alimentacao)}
.undo{margin-top:6px;font-size:12.5px;color:var(--wa-teal);background:none;border:none;cursor:pointer;font-weight:600;padding:3px 0}
.ecard-actions{display:flex;gap:8px;margin-top:7px}
.ec-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--ink-3);padding:3px 2px}
.ec-act.detail{color:var(--wa-teal)}
.ec-act svg{width:14px;height:14px}
.ec-act:active{opacity:.6}
.ec-note{color:var(--wa-teal);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.chips button{background:#fff;border:1px solid var(--line);color:var(--ink-2);border-radius:18px;padding:7px 12px;font-size:12.5px;cursor:pointer;box-shadow:var(--e1);font-weight:500}
.chips button:active{transform:scale(.95)}
.typing{align-self:flex-start;background:#fff;border-radius:0 9px 9px 9px;padding:11px 14px;display:flex;gap:4px;box-shadow:var(--e1)}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-3);animation:bl 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
/* mini gráfico consulta */
.qbubble{align-self:flex-start;background:var(--wa-in);border-radius:0 9px 9px 9px;box-shadow:var(--e1);padding:12px;max-width:92%;width:300px;animation:msgIn .24s}
.qbubble .qt{font-size:13.5px;color:var(--ink-2);margin-bottom:11px;line-height:1.4}
.qbubble .qt b{color:var(--ink)}
.qbar{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.qbar .ql{font-size:12px;width:82px;flex-shrink:0;color:var(--ink-2)}
.qbar .qtrack{flex:1;height:18px;background:var(--wa-panel);border-radius:6px;overflow:hidden}
.qbar .qtrack i{display:block;height:100%;border-radius:6px;transition:width .5s}
.qbar .qv{font-size:11.5px;font-weight:700;width:60px;text-align:right;flex-shrink:0}
.qbubble .qfoot{font-size:12px;color:var(--wa-teal);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px;cursor:pointer}
.qbubble .qfoot svg{width:15px;height:15px}

/* composer */
.composer{flex-shrink:0;padding:8px 8px 12px;display:flex;align-items:flex-end;gap:8px;background:transparent}
.cfield{flex:1;background:#fff;border-radius:24px;display:flex;align-items:flex-end;padding:5px 6px 5px 8px;box-shadow:var(--e1)}
.cfield .emoji,.cfield .att,.cfield .cam{width:34px;height:34px;display:grid;place-items:center;color:var(--ink-3);cursor:pointer;flex-shrink:0}
.cfield .emoji svg,.cfield .att svg,.cfield .cam svg{width:22px;height:22px}
.cfield textarea{flex:1;border:none;outline:none;resize:none;font-size:15px;font-family:inherit;line-height:1.35;padding:8px 4px;max-height:90px;background:none;color:var(--ink)}
.cfield textarea::placeholder{color:var(--ink-3)}
.send{width:48px;height:48px;border-radius:50%;border:none;flex-shrink:0;cursor:pointer;background:var(--wa-green);color:#fff;display:grid;place-items:center;box-shadow:var(--e-fab)}
.send:active{transform:scale(.9)}
.send svg{width:24px;height:24px}

/* ===== dashboard ===== */
.dbody{flex:1;overflow-y:auto;padding:14px 13px 26px;display:flex;flex-direction:column;gap:14px;background:var(--wa-panel)}
.card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--e1);flex-shrink:0}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);margin-bottom:14px;font-weight:700}
.hero{background:linear-gradient(135deg,var(--wa-teal),#00a884);color:#fff;border-radius:20px;padding:20px;box-shadow:var(--e2);position:relative;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:#ffffff14;z-index:0}
.hero .lbl{font-size:12.5px;opacity:.85;position:relative;z-index:1}
.hero .v{font-size:34px;font-weight:800;letter-spacing:-1px;margin-top:2px;position:relative;z-index:1}
.hero .v.neg{color:#FFD9D6}
.hrow{display:flex;gap:8px;margin-top:18px;position:relative;z-index:1}
.hrow .b{flex:1;background:#ffffff;border-radius:14px;padding:11px 10px 12px;box-shadow:0 3px 8px rgba(0,0,0,.14);position:relative;overflow:hidden}
.hrow .b .ico{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;margin-bottom:7px}
.hrow .b .ico svg{width:15px;height:15px}
.hrow .b .l{font-size:10.5px;color:var(--ink-3);font-weight:600;letter-spacing:.2px}
.hrow .b .n{font-size:16px;font-weight:800;margin-top:3px;letter-spacing:-.3px;white-space:nowrap}
.hrow .b.entrou .ico{background:#22B57318;color:#1a9560}
.hrow .b.entrou .n{color:#1a9560}
.hrow .b.gastos .ico{background:#E8638A18;color:#d44d72}
.hrow .b.gastos .n{color:#c44063}
.hrow .b.fixos .ico{background:#3D7BF018;color:#3D7BF0}
.hrow .b.fixos .n{color:#2f63cc}
.pie-wrap{display:flex;gap:16px;align-items:center}
.pie{width:132px;height:132px;flex-shrink:0;position:relative;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12))}
.pie .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;gap:1px}
.pie .center .pv{font-size:17px;font-weight:800;color:var(--ink);line-height:1.05;letter-spacing:-.3px}
.pie .center .pc{font-size:9.5px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0}
.legend .li{display:flex;align-items:center;gap:9px;font-size:12.5px;cursor:pointer;padding:5px 6px;margin:0 -6px;border-radius:9px;transition:background .15s}
.legend .li:active{background:var(--wa-panel)}
.legend .li .li-arrow{color:var(--ink-3);display:flex;align-items:center;flex-shrink:0;margin-left:1px;opacity:.55}
.legend .li .li-arrow svg{width:15px;height:15px}
.legend .li .sw{width:11px;height:11px;border-radius:4px;flex-shrink:0;box-shadow:var(--e1)}
.legend .li .nm{flex:1;color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend .li .pct{color:var(--ink-3);font-size:11.5px}
.legend .li .am{font-weight:700;font-size:12px;color:var(--ink)}
.tap-hint{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.tap-hint::before{content:"👆";font-size:13px}

/* ===== TELA DE EVOLUÇÃO ===== */
.evo-body{flex:1;overflow-y:auto;background:var(--wa-panel);padding:16px 14px 28px;display:flex;flex-direction:column;gap:16px}
.evo-syn{background:linear-gradient(135deg,var(--wa-teal),#00a884);color:#fff;border-radius:18px;padding:18px;box-shadow:var(--e2);position:relative;overflow:hidden;flex-shrink:0}
.evo-syn::after{content:"";position:absolute;right:-26px;top:-26px;width:120px;height:120px;border-radius:50%;background:#ffffff14}
.evo-syn .es-lbl{font-size:11.5px;opacity:.85;text-transform:uppercase;letter-spacing:.5px;position:relative;z-index:1}
.evo-syn .es-main{font-size:15px;line-height:1.5;margin-top:8px;position:relative;z-index:1}
.evo-syn .es-main b{font-weight:800}
.evo-syn .es-stats{display:flex;gap:18px;margin-top:14px;position:relative;z-index:1}
.evo-syn .es-stats .est .v{font-size:20px;font-weight:800;letter-spacing:-.3px}
.evo-syn .es-stats .est .l{font-size:10.5px;opacity:.85;margin-top:1px}

.evo-card{background:#fff;border-radius:18px;padding:16px 14px;box-shadow:var(--e1);flex-shrink:0}
.evo-card .ec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.evo-card h3{font-size:13px;font-weight:700;color:var(--ink)}
.evo-card .ec-sub{font-size:11px;color:var(--ink-3);margin-bottom:16px}

/* gráfico de barras de saldo (divergente do zero) */
.bars{display:flex;align-items:stretch;height:150px;gap:6px;position:relative}
.bars .zero-line{position:absolute;left:0;right:0;height:1px;background:var(--line);z-index:1}
.bars .bcol{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
.bars .bcol .btop{flex:1;display:flex;flex-direction:column;justify-content:flex-end;width:100%;align-items:center}
.bars .bcol .bbot{flex:1;display:flex;flex-direction:column;justify-content:flex-start;width:100%;align-items:center}
.bars .bcol .bar{width:60%;max-width:30px;border-radius:5px 5px 0 0;transition:height .5s cubic-bezier(.2,.8,.2,1);position:relative}
.bars .bcol .bar.neg{border-radius:0 0 5px 5px}
.bars .bcol .bar.pos{background:linear-gradient(180deg,#3ddc97,#1faa66)}
.bars .bcol .bar.neg{background:linear-gradient(180deg,#f0a090,#e07a5f)}
.bars .bcol .bval{font-size:9.5px;font-weight:700;position:absolute;white-space:nowrap}
.bars .bcol .bar.pos .bval{top:-15px;color:#1a9560}
.bars .bcol .bar.neg .bval{bottom:-15px;color:#c44063}
.bars-x{display:flex;gap:6px;margin-top:8px}
.bars-x span{flex:1;text-align:center;font-size:11px;color:var(--ink-3);font-weight:600}

/* gráfico de patrimônio (linhas reserva up / dívida down) */
.pat-chart{position:relative;height:160px;margin-top:4px}
.pat-legend{display:flex;gap:16px;margin-bottom:12px}
.pat-legend .pl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-weight:600}
.pat-legend .pl .dot{width:10px;height:10px;border-radius:50%}
.pat-x{display:flex;margin-top:8px}
.pat-x span{flex:1;text-align:center;font-size:11px;color:var(--ink-3);font-weight:600}
.pat-end{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.pat-end .pe{text-align:center;flex:1}
.pat-end .pe .pv{font-size:17px;font-weight:800}
.pat-end .pe .pv.res{color:#1a9560}
.pat-end .pe .pv.div{color:#E8A317}
.pat-end .pe .pl2{font-size:10.5px;color:var(--ink-3);margin-top:2px}
.pat-end .pe .delta{font-size:10.5px;font-weight:700;margin-top:3px}
.pat-end .pe .delta.up{color:#1a9560}
.pat-end .pe .delta.down{color:#1a9560}

.evo-open{display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:15px;font-size:14.5px;font-weight:700;color:var(--wa-teal);cursor:pointer;box-shadow:var(--e1);margin-top:2px}
.evo-open svg{width:19px;height:19px}
.legend .empty{font-size:13px;color:var(--ink-3);line-height:1.4}
.estimate-flag{font-size:10px;color:var(--warn);font-weight:700;margin-left:5px}
.fix-item{display:flex;flex-direction:column;padding:12px 0;border-bottom:1px solid var(--line)}
.fix-item:last-of-type{border-bottom:none}
.fix-item .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;box-shadow:var(--e1)}
.fix-item .mid{flex:1;min-width:0}
.fix-item .mid .t{font-size:14.5px;font-weight:600}
.fix-item .mid .s{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.fix-item .mid .bar{height:6px;background:var(--line);border-radius:4px;margin-top:7px;overflow:hidden}
.fix-item .mid .bar i{display:block;height:100%;border-radius:4px}
.fix-item .rt{text-align:right;flex-shrink:0}
.fix-item .rt .p{font-size:15px;font-weight:700}
.fix-item .rt .d{font-size:10px;color:var(--ink-3);margin-top:1px}
.bell-mini{width:22px;height:22px;border-radius:50%;background:#FBF3DD;display:inline-grid;place-items:center;vertical-align:middle;margin-left:6px}
.bell-mini .excl{color:var(--warn);font-weight:800;font-size:13px}
.goal{padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer}
.goal:last-of-type{border-bottom:none}
.goal .gtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.goal .gtop .t{font-size:14.5px;font-weight:600}
.goal .gtop .h{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:#FBF3DD;padding:3px 8px;border-radius:7px}
.goal .pbar{height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.goal .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#EFD58A);border-radius:6px;transition:width .6s}
.goal .nums{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3);margin-top:7px}
.goal .nums b{color:var(--ink)}
.addline{display:flex;align-items:center;gap:8px;color:var(--wa-teal);font-size:13.5px;font-weight:600;padding:12px 0 2px;cursor:pointer}
.addline svg{width:18px;height:18px}

/* ===== ACCORDION DE HISTÓRICO ===== */
.chev{width:22px;height:22px;display:grid;place-items:center;color:var(--ink-3);flex-shrink:0;transition:transform .28s cubic-bezier(.2,.8,.2,1)}
.chev svg{width:18px;height:18px}
.chev.open{transform:rotate(180deg)}
.hist{overflow:hidden;max-height:0;transition:max-height .32s cubic-bezier(.2,.8,.2,1);background:var(--wa-panel);border-radius:12px}
.hist.open{max-height:460px;margin-top:10px}
.hist-inner{padding:4px 12px}
.hist-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.hist-row:last-child{border-bottom:none}
.hist-row .hm{font-size:13px;font-weight:600;width:74px;flex-shrink:0}
.hist-row .hd{font-size:11.5px;color:var(--ink-3);flex:1}
.hist-row .hv{font-size:14px;font-weight:700;flex-shrink:0}
.hist-row .hv.pay{color:var(--ink)}
.hist-row .hv.dep{color:var(--c-alimentacao)}
.hist-row .hsaldo{font-size:10.5px;color:var(--ink-3);text-align:right;flex-shrink:0;width:92px}
.hist-row .hsaldo b{color:var(--ink-2);font-weight:700}
.hist-foot{padding:11px 0 5px;font-size:12px;color:var(--ink-3);text-align:center;border-top:1px solid var(--line);margin-top:2px}
.hist-foot b{color:var(--ink)}
.hist-empty{padding:18px 4px;text-align:center;font-size:12.5px;color:var(--ink-3);line-height:1.45}
.fix-row-main{display:flex;align-items:center;gap:12px;cursor:pointer}
.fix-row-main .mid{flex:1;min-width:0}
.fix-row-main .ic{flex-shrink:0}
.goal-top-click{cursor:pointer}
.goal-deposit-add{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:8px;padding:10px;background:#fff;border:1.5px dashed var(--line);border-radius:10px;font-size:12.5px;color:var(--wa-teal);font-weight:600;cursor:pointer}
.goal-deposit-add svg{width:15px;height:15px}

/* ===== MEU HISTÓRICO (lista de meses) ===== */
.hist-section{background:#fff;border-radius:18px;padding:16px 14px 8px;box-shadow:var(--e1);flex-shrink:0}
.hist-section h3{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.hist-section .hs-sub{font-size:11px;color:var(--ink-3);margin-bottom:12px}
.month-row{display:flex;align-items:center;gap:12px;padding:13px 8px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;border-radius:8px;margin:0 -4px}
.month-row:last-child{border-bottom:none}
.month-row:active{background:var(--wa-panel)}
.month-row .mr-dot{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;font-size:13px;font-weight:800}
.month-row .mr-dot.pos{background:#22B57318;color:#1a9560}
.month-row .mr-dot.neg{background:#E8638A18;color:#c44063}
.month-row .mr-mid{flex:1;min-width:0}
.month-row .mr-mid .mr-t{font-size:14.5px;font-weight:600;display:flex;align-items:center}
.month-row .mr-mid .mr-s{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.month-row .mr-rt{text-align:right;flex-shrink:0}
.month-row .mr-rt .mr-v{font-size:15px;font-weight:800}
.month-row .mr-rt .mr-v.pos{color:#1a9560}
.month-row .mr-rt .mr-v.neg{color:#c44063}
.month-row .mr-arrow{color:var(--ink-3);flex-shrink:0;opacity:.5}
.month-row .mr-arrow svg{width:18px;height:18px}
.badge-now{font-size:9px;font-weight:800;background:var(--wa-teal);color:#fff;border-radius:6px;padding:2px 6px;margin-left:6px;text-transform:uppercase;letter-spacing:.3px}

/* ===== RETRATO MENSAL ===== */
.snap-body{flex:1;overflow-y:auto;background:var(--wa-panel);padding:14px 13px 26px;display:flex;flex-direction:column;gap:14px}
.snap-hero{border-radius:20px;padding:20px;color:#fff;box-shadow:var(--e2);position:relative;overflow:hidden;flex-shrink:0}
.snap-hero.pos{background:linear-gradient(135deg,#1a9560,#23b377)}
.snap-hero.neg{background:linear-gradient(135deg,#b85c4a,#c44063)}
.snap-hero::after{content:"";position:absolute;right:-26px;top:-26px;width:120px;height:120px;border-radius:50%;background:#ffffff14}
.snap-hero .sh-lbl{font-size:12px;opacity:.85;position:relative;z-index:1}
.snap-hero .sh-v{font-size:32px;font-weight:800;letter-spacing:-1px;margin-top:2px;position:relative;z-index:1}
.snap-hero .sh-tag{display:inline-block;margin-top:8px;background:#ffffff22;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:20px;position:relative;z-index:1}
.snap-hero .sh-row{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
.snap-hero .sh-row .b{flex:1;background:#ffffff1f;border-radius:12px;padding:9px 10px}
.snap-hero .sh-row .b .l{font-size:10px;opacity:.85}
.snap-hero .sh-row .b .n{font-size:14px;font-weight:700;margin-top:2px}
.snap-cats{background:#fff;border-radius:18px;padding:16px 14px;box-shadow:var(--e1);flex-shrink:0}
.snap-cats h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);margin-bottom:14px;font-weight:700}
.snap-cat{display:flex;align-items:center;gap:11px;padding:9px 0;cursor:pointer}
.snap-cat:active{opacity:.6}
.snap-cat .sc-arrow{color:var(--ink-3);opacity:.5;flex-shrink:0}
.snap-cat .sc-arrow svg{width:17px;height:17px}
.snap-cat .sc-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.snap-cat .sc-mid{flex:1;min-width:0}
.snap-cat .sc-mid .sc-t{font-size:13.5px;font-weight:500;margin-bottom:5px;display:flex;justify-content:space-between}
.snap-cat .sc-mid .sc-t .sc-v{font-size:13.5px;font-weight:700}
.snap-cat .sc-bar{height:6px;background:var(--wa-panel);border-radius:4px;overflow:hidden}
.snap-cat .sc-bar i{display:block;height:100%;border-radius:4px}

/* extrato */
.cat-hero{padding:34px 16px 18px;color:#fff;flex-shrink:0;box-shadow:var(--e2);z-index:5}
.cat-hero .row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.cat-hero .bk{width:34px;height:40px;display:grid;place-items:center;border:none;background:none;color:#fff;cursor:pointer}
.cat-hero .bk svg{width:24px;height:24px}
.cat-hero .ttl{font-size:17px;font-weight:600;flex:1}
.cat-hero .big-ic{width:30px;height:30px;border-radius:9px;background:#ffffff2e;display:grid;place-items:center;font-size:17px}
.cat-hero .total{font-size:32px;font-weight:800;letter-spacing:-1px}
.cat-hero .sub{font-size:12.5px;opacity:.88;margin-top:3px}
.txlist{flex:1;overflow-y:auto;background:var(--wa-panel)}
.tx{display:flex;align-items:center;gap:13px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--line)}
.tx .ti{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex-shrink:0;background:var(--wa-panel)}
.tx .tm{flex:1;min-width:0}
.tx .tm .td{font-size:14.5px;font-weight:500}
.tx .tm .tt{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.tx .tv{font-weight:700;font-size:15px}
.tx .tag-src{font-size:9.5px;color:var(--ink-3);background:var(--wa-panel);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-left:7px}
.tx-note{font-size:12px;color:var(--wa-teal-d);margin-top:5px;line-height:1.35;background:#E7F5F1;padding:5px 9px;border-radius:8px;display:inline-block}
.tx-addnote{font-size:11.5px;color:var(--ink-3);margin-top:5px;font-weight:500}
.snap-cat-foot{padding:16px;text-align:center;font-size:12px;color:var(--ink-3);background:var(--wa-panel)}
.snap-cat-foot b{color:var(--ink)}

/* ===== ONBOARDING (promessa + questionário) ===== */
.promise{flex:1;display:flex;flex-direction:column;background:#fff;padding:52px 28px 26px;overflow-y:auto}
.promise .logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--wa-green),var(--wa-teal));display:grid;place-items:center;font-size:35px;box-shadow:var(--e2);margin-bottom:24px}
.promise h2{font-size:25px;font-weight:700;line-height:1.22;letter-spacing:-.3px}
.promise p.lead{font-size:15px;color:var(--ink-2);line-height:1.55;margin-top:14px}
.promise .assure{margin-top:26px;display:flex;flex-direction:column;gap:14px}
.promise .assure .it{display:flex;gap:13px;align-items:flex-start}
.promise .assure .it .ic{width:38px;height:38px;border-radius:11px;background:#E7F5F1;display:grid;place-items:center;flex-shrink:0;font-size:18px}
.promise .assure .it .tx{font-size:14px;line-height:1.4;color:var(--ink-2);padding-top:3px}
.promise .assure .it .tx b{color:var(--ink)}
.promise .go{margin-top:auto;background:var(--wa-green);color:#fff;border:none;border-radius:15px;padding:17px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--e-fab)}
.promise .go:active{transform:scale(.98)}
.intro-feats{margin-top:24px;display:flex;flex-direction:column;gap:16px}
.intro-feats .it{display:flex;gap:13px;align-items:flex-start}
.intro-feats .it .ic{width:40px;height:40px;border-radius:12px;background:#E7F5F1;display:grid;place-items:center;flex-shrink:0;font-size:19px}
.intro-feats .it .tx{font-size:14px;line-height:1.45;color:var(--ink-2);padding-top:2px}
.intro-feats .it .tx b{color:var(--ink)}
.intro-close{font-size:14px;color:var(--ink-2);line-height:1.5;margin-top:24px;margin-bottom:20px}
.quiz-rules{margin-top:24px;display:flex;flex-direction:column;gap:16px}
.quiz-rules .qr{display:flex;gap:13px;align-items:flex-start}
.quiz-rules .qr .qr-ic{width:40px;height:40px;border-radius:12px;background:#E7F5F1;display:grid;place-items:center;flex-shrink:0;font-size:19px}
.quiz-rules .qr .qr-tx{font-size:14px;line-height:1.45;color:var(--ink-2);padding-top:2px}
.quiz-rules .qr .qr-tx b{color:var(--ink)}
.onb{flex:1;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}
.onb-top{padding:34px 22px 0;flex-shrink:0}
.blocklabel{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.blocklabel .bl{font-size:12px;font-weight:700;letter-spacing:.4px;color:var(--wa-teal);text-transform:uppercase}
.blocklabel .ct{font-size:11.5px;color:var(--ink-3);font-weight:600}
.segbar{display:flex;gap:5px}
.segbar .seg{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
.segbar .seg i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--wa-green),var(--wa-teal));border-radius:4px;transition:width .4s cubic-bezier(.2,.8,.2,1)}
.qarea{flex:1;position:relative;overflow:hidden}
.qcard{position:absolute;inset:0;padding:24px 24px 16px;display:flex;flex-direction:column;opacity:0;transform:translateX(40px);transition:opacity .35s,transform .35s;pointer-events:none;overflow-y:auto}
.qcard.in{opacity:1;transform:none;pointer-events:auto}
.qcard.out-left{opacity:0;transform:translateX(-40px)}
.qcard .step-emoji{font-size:32px;margin-bottom:13px}
.qcard h2{font-size:21px;font-weight:700;line-height:1.24;letter-spacing:-.3px}
.qcard .hint{font-size:13.5px;color:var(--ink-3);line-height:1.45;margin-top:9px}
.qcard .laterhint{font-size:12.5px;color:var(--warn);margin-top:11px;display:flex;align-items:center;gap:6px;background:#FBF3DD;padding:9px 11px;border-radius:10px;line-height:1.35}
.qcard .laterhint svg{width:16px;height:16px;flex-shrink:0}
.qcard .ans{margin-top:18px}
.qcard textarea,.qcard input.txt{width:100%;background:var(--wa-panel);border:1.5px solid var(--line);border-radius:13px;padding:14px;font-size:16px;outline:none;resize:none;font-family:inherit;line-height:1.4;color:var(--ink);transition:border-color .2s,box-shadow .2s}
.qcard textarea:focus,.qcard input.txt:focus{border-color:var(--wa-green);box-shadow:0 0 0 4px rgba(37,211,102,.12)}
.qcard .skips{display:flex;gap:10px;margin-top:14px}
.skipbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:13.5px;color:var(--ink-2);cursor:pointer;font-weight:600}
.skipbtn:active{transform:scale(.97)}
.skipbtn.sel{border-color:var(--wa-teal);background:#E7F5F1;color:var(--wa-teal)}
.skipbtn .bx{width:18px;height:18px;border:2px solid var(--ink-3);border-radius:5px;display:grid;place-items:center;flex-shrink:0}
.skipbtn.sel .bx{border-color:var(--wa-teal);background:var(--wa-teal)}
.skipbtn.sel .bx::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.qcard.transition{align-items:center;justify-content:center;text-align:center}
.qcard.transition .big{font-size:54px;margin-bottom:18px;animation:bounce .6s cubic-bezier(.2,.8,.2,1.1)}
@keyframes bounce{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.qcard.transition h2{font-size:23px}
.qcard.transition .hint{font-size:15px;max-width:280px}
.profile-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:6px}
.avatar-pick{width:100px;height:100px;border-radius:50%;background:var(--wa-panel);border:2px dashed var(--ink-3);display:grid;place-items:center;cursor:pointer;overflow:hidden;position:relative;margin-bottom:8px}
.avatar-pick img{width:100%;height:100%;object-fit:cover}
.avatar-pick .cam{position:absolute;bottom:0;right:0;width:32px;height:32px;border-radius:50%;background:var(--wa-green);display:grid;place-items:center;border:3px solid #fff}
.avatar-pick .cam svg{width:16px;height:16px;color:#fff}
.avatar-pick .ph{font-size:38px;color:var(--ink-3)}
.profile-card .pl{font-size:12.5px;color:var(--ink-3);margin-bottom:20px}
.onb-nav{display:flex;gap:10px;align-items:center;width:100%;margin-top:24px;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.backq{width:50px;height:52px;border-radius:14px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.backq svg{width:22px;height:22px}.backq:disabled{opacity:.4}
.nextq{flex:1;background:var(--wa-green);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--e-fab)}
.nextq:active{transform:scale(.98)}.nextq:disabled{background:#cfd8dc;box-shadow:none;color:#90A4AE}

/* ===== FOOTER DE NAVEGAÇÃO ===== */
.appfooter{position:absolute;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--line);display:none;align-items:stretch;z-index:50;box-shadow:0 -2px 12px rgba(11,27,33,.06);padding-bottom:env(safe-area-inset-bottom)}
.appfooter .fitem{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-3);padding:8px 0;transition:color .15s}
.appfooter .fitem .fic{width:26px;height:26px;display:grid;place-items:center}
.appfooter .fitem .fic svg{width:23px;height:23px}
.appfooter .fitem span{font-size:11px;font-weight:600}
.appfooter .fitem.active{color:var(--wa-teal)}
.appfooter .fitem.active .fic{position:relative}
.appfooter .fitem:active{opacity:.6}

/* dá espaço pro footer não cobrir conteúdo nas 3 áreas */
.view[data-v="dash"] .dbody{padding-bottom:80px}
.view[data-v="evo"] .evo-body{padding-bottom:80px}
.view[data-v="chat"] .composer{margin-bottom:64px}

/* ===== TELA DE CONCLUSÃO ===== */
.done-screen{flex:1;display:flex;flex-direction:column;background:#fff;padding:46px 26px 26px;overflow-y:auto;text-align:center;align-items:center}
.done-check{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--wa-green),var(--wa-teal));display:grid;place-items:center;color:#fff;box-shadow:0 8px 20px rgba(37,211,102,.35);margin-bottom:22px;animation:popCheck .5s cubic-bezier(.2,.8,.2,1.2)}
.done-check svg{width:38px;height:38px}
@keyframes popCheck{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.done-screen h2{font-size:24px;font-weight:800;letter-spacing:-.4px}
.done-screen h2 span{color:var(--wa-teal)}
.done-lead{font-size:14.5px;color:var(--ink-2);line-height:1.5;margin-top:12px;max-width:320px}
.done-areas{width:100%;margin-top:26px;display:flex;flex-direction:column;gap:14px;text-align:left}
.done-areas .da{display:flex;gap:14px;align-items:flex-start;background:var(--wa-panel);border-radius:14px;padding:14px}
.done-areas .da .da-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:21px;flex-shrink:0}
.done-areas .da .da-tx{font-size:13px;line-height:1.45;color:var(--ink-2)}
.done-areas .da .da-tx b{display:block;font-size:15px;color:var(--ink);margin-bottom:3px}
.done-go{margin-top:26px;width:100%;background:var(--wa-green);color:#fff;border:none;border-radius:15px;padding:17px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--e-fab)}
.done-go:active{transform:scale(.98)}
.test-nav{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:#0b141a;border-radius:24px;padding:6px 8px;box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:40}
.test-nav button{width:38px;height:38px;border-radius:50%;border:none;background:#1f2c34;color:#e9edef;cursor:pointer;display:grid;place-items:center}
.test-nav button:active{background:#2a3942}
.test-nav button svg{width:20px;height:20px}
.test-nav span{font-size:11px;color:#8696a0;font-weight:700;min-width:54px;text-align:center}
.tx{cursor:pointer}
.tx:active{background:var(--wa-panel)}
.txempty{padding:40px 24px;text-align:center;color:var(--ink-3);font-size:14px;line-height:1.5}

/* lightbox */
.lb-overlay{position:absolute;inset:0;background:rgba(11,27,33,.55);z-index:80;display:none;align-items:flex-end}
.lb-overlay.open{display:flex;animation:fadeIn .2s}
.lb{width:100%;background:var(--wa-panel);color:var(--ink);border-top:1px solid var(--line);border-radius:22px 22px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px rgba(0,0,0,.45);animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.lb .grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 18px}
.lb .lbic{width:48px;height:48px;border-radius:13px;background:#FBF3DD;display:grid;place-items:center;font-size:22px;margin-bottom:14px}
.lb h3{font-size:18px;font-weight:700}
.lb p{font-size:14px;color:var(--ink-2);line-height:1.5;margin-top:8px}
.lb .lbfield{margin-top:16px;background:var(--wa-bg);color:var(--ink);border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;outline:none;width:100%;font-family:inherit}
.lb .lbfield::placeholder{color:var(--ink-3)}
.lb .lbfield:focus{border-color:var(--wa-teal);box-shadow:0 0 0 4px rgba(0,128,105,.16)}
.lb-counter{display:none;text-align:right;font-size:11px;color:var(--ink-3);margin-top:6px;font-weight:600}
.lb-counter.near{color:var(--warn)}
.lb .lbrow{display:flex;gap:10px;margin-top:16px}
.lb .lbrow button{flex:1;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;border:none;cursor:pointer}
.lb .later{background:transparent;border:1.5px solid var(--line);color:var(--ink-2)}
.lb .save{background:var(--wa-green);color:#fff;box-shadow:var(--e-fab)}
.lb .lb-delete{margin-top:14px;width:100%;background:transparent;border:1.5px solid #e2574733;color:#e25747;border-radius:12px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer}

.hidden{display:none!important}
/* boot splash (decide painel vs onboarding sem piscar) */
.boot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(135deg,var(--wa-teal),var(--wa-green))}
.boot-logo{font-size:46px}
.boot-spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:boot-rot .8s linear infinite}
.boot-txt{font-size:13px;color:rgba(255,255,255,.85);letter-spacing:.3px}
@keyframes boot-rot{to{transform:rotate(360deg)}}

/* ===== classes que o render usa e que faltavam na folha do protótipo ===== */
/* painel — hero (label + valor) já estão sob .hero via .lbl/.v (renomeados no JSX) */
/* composer (chat) */
.composer .cinput{flex:1;background:#fff;border:none;outline:none;border-radius:24px;font-size:15px;font-family:inherit;padding:13px 16px;box-shadow:var(--e1);color:var(--ink);min-width:0}
.composer .cinput::placeholder{color:var(--ink-3)}
.composer .csend{width:48px;height:48px;border-radius:50%;border:none;flex-shrink:0;cursor:pointer;background:var(--wa-green);color:#fff;display:grid;place-items:center;box-shadow:var(--e-fab)}
.composer .csend:active{transform:scale(.9)}
.composer .csend svg{width:24px;height:24px}
.composer .cphoto{width:44px;height:44px;border-radius:50%;border:none;flex-shrink:0;cursor:pointer;background:#fff;color:var(--wa-green);display:grid;place-items:center;box-shadow:var(--e1)}
.composer .cphoto:active{transform:scale(.9)}
.composer .cphoto svg{width:22px;height:22px}
/* miniatura de cupom (TxRow + card do chat) */
.tx-cupom{display:inline-block;margin-top:6px}
.tx-cupom img{width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.ecard-cupom{display:block;margin-top:8px}
.ecard-cupom img{max-width:120px;max-height:150px;width:auto;border-radius:10px;border:1px solid var(--line)}
/* compromissos fixos */
.fixwrap{border-bottom:1px solid var(--line)}
.fixwrap:last-of-type{border-bottom:none}
.fixrow{display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer}
.fixrow .fic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;box-shadow:var(--e1);background:var(--wa-panel)}
.fmid{flex:1;min-width:0}
.fmid .fn{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.fmid .fs{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.fbar{height:6px;background:var(--line);border-radius:4px;margin-top:7px;overflow:hidden}
.fbar i{display:block;height:100%;border-radius:4px;background:var(--wa-teal)}
.fval{text-align:right;flex-shrink:0;font-size:15px;font-weight:700;white-space:nowrap}
.fval span{font-size:10px;color:var(--ink-3);font-weight:500;display:block;margin-top:1px}
.fchev{width:22px;height:22px;display:grid;place-items:center;color:var(--ink-3);flex-shrink:0;transition:transform .28s cubic-bezier(.2,.8,.2,1)}
.fchev.up{transform:rotate(180deg)}
.warn-dot{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;background:#FBF3DD;color:var(--warn);font-weight:800;font-size:12px;line-height:1;flex-shrink:0}
/* objetivos */
.goalwrap{padding:14px 0;border-bottom:1px solid var(--line)}
.goalwrap:last-of-type{border-bottom:none}
.goalrow{display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:9px}
.goalrow .gn{font-size:14.5px;font-weight:600;flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.gtag{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:#FBF3DD;padding:3px 8px;border-radius:7px;flex-shrink:0}
.gchev{width:22px;height:22px;display:grid;place-items:center;color:var(--ink-3);flex-shrink:0;transition:transform .28s cubic-bezier(.2,.8,.2,1)}
.gchev.up{transform:rotate(180deg)}
.gpend{font-size:12.5px;color:var(--ink-3);padding:2px 0}
.gbar{height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.gbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#EFD58A);border-radius:6px;transition:width .6s}
.grow2{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink-3);margin-top:7px;gap:8px}
.grow2 b{color:var(--ink);font-weight:700}
/* lightbox (detalhe / aporte) — variantes camelCase do render */
.lb .lbIc{width:48px;height:48px;border-radius:13px;background:#FBF3DD;display:grid;place-items:center;font-size:22px;margin-bottom:14px}
.lb .lbTitle{font-size:18px;font-weight:700;color:var(--ink)}
.lb .lbText{font-size:14px;color:var(--ink-2);line-height:1.5;margin-top:8px}

/* ===== clareira pro footer fixo (as regras [data-v] do protótipo nunca casavam) ===== */
.dbody{padding-bottom:84px}
.evo-body{padding-bottom:84px}
.composer{margin-bottom:64px}

/* ===== modo real (embed): tela cheia, sem moldura de celular =====
   phone vira position:fixed/inset:0 — preenche o viewport (ou o iframe) de forma
   determinística, sem depender de cadeia de width:% do flex (que colapsa pra 0). */
.stage.real{padding:0}
.stage.real .phone{position:fixed;inset:0;width:auto;height:auto;max-width:none;border-radius:0;box-shadow:none}
.stage.real .phone::before{display:none}

@media(max-width:430px){.stage{padding:0}.phone{width:100%;height:calc(100dvh - 132px);border-radius:0;box-shadow:none}.phone::before{display:none}}
